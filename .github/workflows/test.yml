name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.9', '3.13']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      # No dependencies — the suites run as plain scripts (exit non-zero on failure).
      - name: hook tests
        run: python tests/test_index_guard.py
      - name: tool tests
        run: python tests/test_tools.py
